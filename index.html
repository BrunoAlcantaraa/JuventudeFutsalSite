<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juventude Futsal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <a href="https://www.instagram.com/juv.sc" target="blank"><img src="img/escudo/escudo-juv.png" alt="Escudo Juventude Futsal" class="escudo"></a>

        <nav>

            <a href="#comissao">Comissão</a>
            <a href="#titulos">Títulos</a>

    <img src="img/jogadores/time-inteiro.png" alt="Foto Elenco Juventude Futsal" class="foto-elenco">

    <main>
        <section id="elenco">

            <div id="lista-titulos" class="container-titulo"></div>
        </section>

    <footer>
        <p>© 2025 Juventude Futsal - Todos os direitos reservados</p>

    <script src="script.js"></script>
